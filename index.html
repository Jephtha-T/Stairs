<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ambiguous Parallax is an interactive Three.js sculpture built around optical alignment, shifting shadows, and a GLB model."
    />
    <link rel="icon" type="image/png" href="./Stairs.png" />
    <title>Where Are We Going?</title>
  </head>
  <body>
    <canvas id="scene"></canvas>

    <main class="hud" aria-label="Scene controls">
      <header class="brand">
        <p class="eyebrow">Inspired by <em>Ambiguous wall-Stairs YB1;3</em>, 2022 by Byungjoo Kim</p>
        <h1>Where Are We Going?</h1>
      </header>

      <nav class="toolbar" aria-label="View controls">
        <button type="button" class="control-button is-active" data-action="full-view">
          Full 3D
        </button>
        <button type="button" class="control-button" data-action="front-view">
          Relief
        </button>
        <!-- Illusion mode removed -->
        <button type="button" class="control-button is-active" data-action="shadows" aria-pressed="true">
          Shadows
        </button>
        <button type="button" class="control-button" data-action="reset">
          Reset
        </button>
      </nav>

      <section class="light-panel" aria-label="Light position">
        <div class="panel-title">Adjust Light</div>
        <div class="panel-title">Position:</div>
        <label>
          <span>X</span>
          <input type="range" min="-7" max="7" step="0.1" value="4" data-light-axis="x" />
        </label>
        <label>
          <span>Y</span>
          <input type="range" min="1" max="9" step="0.1" value="6" data-light-axis="y" />
        </label>
        <label>
          <span>Z</span>
          <input type="range" min="-7" max="7" step="0.1" value="4" data-light-axis="z" />
        </label>
        <div class="panel-title">Intensity & Temperature:</div>
        <label>
          <span>I</span>
          <input type="range" min="0" max="24" step="0.1" value="12" data-light-intensity="true" />
        </label>
        <label>
          <span>K</span>
          <input type="range" min="2000" max="9000" step="50" value="4200" data-light-temperature="true" />
        </label>
      </section>

      <section class="nav-help" aria-label="Mouse controls">
        <div class="nav-help-header">
          <div class="panel-title">Mouse Controls</div>
          <button type="button" class="nav-help-close" data-action="close-nav-help" aria-label="Close mouse controls">
            X
          </button>
        </div>
        <p>Left Mouse Button: Drag to rotate the view</p>
        <p>Scroll Wheel: Scroll to zoom</p>
      </section>

      <output class="status" id="status">Loading Stairs.glb</output>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
